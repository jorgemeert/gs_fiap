<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa OpenStreetMap</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style (1).css" />
  </head>
  <body>
    <header>
      <h1>OrbitFlow</h1>
      <p>
        Compare ou veja a eficiência energética de possíveis bases de lançamento
        especial a partir da geolocalização
      </p>
    </header>
    <main>
      <section>
        <div id="map" aria-label="Mapa OpenStreetMap"></div>
        <div class="btnTroca">
          <button id="btnInd">Análise individual</button>
          <button id="btnComp">Análise Comparativa</button>
        </div>

        <p id="coords">Clique no mapa para ver latitude e longitude.</p>

        <div class="dados">
          <label for="base" class="dadosInd">Nome da Base</label>
          <input id="base" type="text" class="dadosInd" />
          <label for="latitude" class="dadosInd">Latitude</label>
          <input id="latitude" type="text" class="dadosInd" />
          <button id="botao" class="dadosInd">Analisar Lançamento</button>
          <div id="erro" class="dadosInd"></div>
        </div>
        <div class="dadosComp"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="script.js"></script>
  </body>
</html>
